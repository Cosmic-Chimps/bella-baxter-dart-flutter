name: Publish to pub.dev

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Publish bella_baxter_flutter to pub.dev
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for OIDC trusted publishing
      contents: write  # Required for GitHub Release

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Verify VERSION matches tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          FILE_VERSION=$(cat VERSION | tr -d '[:space:]')
          if [ "$TAG" != "$FILE_VERSION" ]; then
            echo "::error::Tag version '$TAG' does not match VERSION file '$FILE_VERSION'"
            exit 1
          fi
          echo "Version check passed: $TAG"

      - name: Set pubspec version from tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          sed -i "s/^version: .*/version: $TAG/" pubspec.yaml

      - name: Remove local dependency override (use published bella_baxter)
        run: rm -f pubspec_overrides.yaml

      - name: Fix example path dependencies to use hosted bella_baxter
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          # Replace path: ../../../dart with the published bella_baxter version in all example pubspecs
          find example -name "pubspec.yaml" | while read f; do
            python3 - "$f" "$TAG" <<'EOF'
          import sys, re
          path, version = sys.argv[1], sys.argv[2]
          content = open(path).read()
          # Replace "bella_baxter:\n    path: ..." block with "bella_baxter: ^VERSION"
          content = re.sub(
              r'bella_baxter:\s*\n\s+path:[^\n]+',
              f'bella_baxter: ^{version}',
              content
          )
          open(path, 'w').write(content)
          print(f'Fixed {path}')
          EOF
          done

      - name: Wait for bella_baxter to be available on pub.dev
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          echo "Waiting for bella_baxter $TAG on pub.dev..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://pub.dev/packages/bella_baxter/versions/$TAG")
            if [ "$STATUS" = "200" ]; then
              echo "✓ bella_baxter $TAG is available on pub.dev (attempt $i)"
              exit 0
            fi
            echo "Attempt $i/30: not yet available (HTTP $STATUS), waiting 20s..."
            sleep 20
          done
          echo "::error::bella_baxter $TAG not available on pub.dev after 10 minutes"
          exit 1

      - run: flutter pub get

      - run: dart analyze --fatal-infos

      - name: Publish to pub.dev
        run: dart pub publish --force

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "bella_baxter_flutter $GITHUB_REF_NAME" \
            --notes "See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details." \
            --verify-tag
