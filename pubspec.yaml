name: bella_baxter_flutter
version: 0.1.1-preview.52
description: >-
  Flutter integration for Bella Baxter secret management. Provides
  FlutterSecureSecretCache backed by flutter_secure_storage for
  encrypted on-device secret caching.
repository: https://github.com/Cosmic-Chimps/bella-baxter-dart-flutter
issue_tracker: https://github.com/Cosmic-Chimps/bella-baxter-dart-flutter/issues
topics:
  - secrets
  - vault
  - configuration
  - security
  - flutter

platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  bella_baxter: ^0.1.1-preview.52
  flutter_secure_storage: '>=9.0.0 <11.0.0'

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: '>=3.0.0 <4.0.0'
