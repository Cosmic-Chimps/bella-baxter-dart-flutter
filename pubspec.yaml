name: bella_baxter_flutter
version: 0.1.1-preview.40
description: >-
  Flutter integration for the Bella Baxter Dart SDK. Provides
  FlutterSecureSecretCache — a SecretCache implementation backed by
  flutter_secure_storage for encrypted on-device secret caching.
homepage: https://bella-baxter.io
repository: https://github.com/Cosmic-Chimps/bella-baxter-dart-flutter
issue_tracker: https://github.com/Cosmic-Chimps/bella-baxter-dart-flutter/issues
topics:
  - secrets
  - vault
  - configuration
  - security
  - flutter

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  bella_baxter: ^0.1.1-preview.40
  flutter_secure_storage: '>=9.0.0 <10.0.0'

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: '>=3.0.0 <4.0.0'
